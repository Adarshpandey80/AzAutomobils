<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ-Automobile - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">

    <style>
        :root{
            --bg1:#0b1020;
            --card: rgba(255,255,255,.10);
            --text: rgba(255,255,255,.92);
            --muted: rgba(255,255,255,.65);
            --primary:#c0a322;
            --primary2:#7511bc;
            --shadow: 0 30px 70px rgba(0,0,0,.45);
        }

        body{
            margin:0;
            min-height:100vh;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
            color: var(--text);
            background: radial-gradient(1000px 600px at 10% 10%, rgba(117,17,188,.35), transparent 60%),
                        radial-gradient(900px 500px at 90% 30%, rgba(192,163,34,.25), transparent 55%),
                        linear-gradient(180deg, var(--bg1), #070a14);
            overflow-x:hidden;
        }

        .backdrop-3d{
            position: fixed;
            inset: 0;
            display:flex;
            align-items:center;
            justify-content:center;
            pointer-events:none;
            perspective: 900px;
            z-index:0;
        }
        .car-wrap{
            width:min(520px, 86vw);
            height:min(360px, 56vw);
            transform-style: preserve-3d;
            transform: rotateY(18deg) rotateX(10deg) translateY(-10px);
            filter: drop-shadow(0 40px 60px rgba(0,0,0,.55));
            opacity:.95;
        }
        .car-wrap::before{
            content:"";
            position:absolute;
            inset:-20px;
            background: radial-gradient(circle at 40% 30%, rgba(255,255,255,.25), transparent 55%),
                        radial-gradient(circle at 70% 60%, rgba(192,163,34,.25), transparent 50%);
            transform: translateZ(-40px);
            border-radius: 30px;
            filter: blur(10px);
        }
        .car-wrap img{
            width:100%;
            height:100%;
            object-fit:cover;
            border-radius: 28px;
            transform: translateZ(40px);
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.15);
        }
        /* Make backdrop feel like full-screen background */
        .backdrop-3d .car-wrap{
            width: min(1100px, 92vw);
            height: min(650px, 70vh);
        }
        @media (max-width: 576px){
            .backdrop-3d .car-wrap{height: 55vh;}
        }

        .page{
            position:relative;
            z-index:1;
            display:flex;
            align-items:center;
            justify-content:center;
            padding: 40px 16px;
        }

        .card-shell{
            width: 430px;
            max-width: 100%;
            border-radius: 18px;
            background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06));
            border: 1px solid rgba(255,255,255,.18);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .card-shell .card-header{
            background: transparent;
            border-bottom: 1px solid rgba(255,255,255,.14);
            padding: 22px 22px 14px;
        }

        .brand{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
        }
        .brand .title{
            font-weight: 800;
            letter-spacing: .2px;
            margin:0;
            font-size: 1.25rem;
        }
        .brand .badge-soft{
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.18);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: 600;
            font-size:.85rem;
        }

        .form-wrap{
            padding: 20px 22px 22px;
        }

        label{
            color: var(--muted);
            font-size:.9rem;
            margin-bottom:6px;
        }

        input[type="email"], input[type="password"]{
            background: rgba(0,0,0,.15);
            border: 1px solid rgba(255,255,255,.20);
            color: var(--text);
            border-radius: 12px;
            padding: 10px 12px;
        }
        input::placeholder{ color: rgba(255,255,255,.45); }
        input:focus{
            outline:none;
            border-color: rgba(192,163,34,.65);
            box-shadow: 0 0 0 .2rem rgba(192,163,34,.20);
            background: rgba(0,0,0,.22);
            color: var(--text);
        }

        .btn-primaryx{
            width:100%;
            padding: 11px 14px;
            border:none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color:white;
            font-weight: 800;
            transition: transform .15s ease, filter .15s ease;
        }
        .btn-primaryx:hover{ transform: translateY(-1px); filter: brightness(1.05); }
        .btn-primaryx:active{ transform: translateY(0px); }

        .helper{
            color: var(--muted);
            font-size: .9rem;
            text-align:center;
            margin-top: 14px;
        }
        .helper a{ color: var(--text); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(255,255,255,.25); }
        .helper a:hover{ border-bottom-color: rgba(192,163,34,.7); }
    </style>
</head>

<body>
    <div class="backdrop-3d">
        <div class="car-wrap" aria-hidden="true">
            <img src="./bikesimages/ car1.jpg" alt="" />
        </div>
    </div>

    <div class="page">
        <div class="card-shell">
            <div class="card-header">
                <div class="brand">
                    <h1 class="title">AZ-Automobile</h1>
                    <span class="badge-soft">Member Login</span>
                </div>
            </div>

            <div class="form-wrap">
                <form action="" id="form" autocomplete="on">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" required class="form-control" autocomplete="username" placeholder="name@example.com" />
                    </div>

                    <div class="mb-3">
                        <label for="pass" class="form-label">Password</label>
                        <input type="password" id="pass" required class="form-control" autocomplete="current-password" placeholder="Enter your password" />
                    </div>

                    <button type="submit" id="login" class="btn-primaryx">Login</button>

                    <div id="invalid" class="mt-3"></div>

                    <div class="helper">
                        New here? <a href="./Local_Storage /registation.html">Create account</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user") || '[]');
        const invalid = document.getElementById("invalid");
        const form = document.getElementById("form");

        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("pass").value;

            const founduser = user.find((u) => u.email === email && u.password === password);

            if (founduser) {
                localStorage.setItem('islogin', JSON.stringify(founduser));
                window.location.href = "../Add_toCard /index1.html";
            } else {
                invalid.innerHTML = `
                    <div class="alert alert-danger" role="alert" style="border-radius:10px;">
                        <strong>Login failed:</strong> email or password is incorrect.
                    </div>
                `;
            }
        });
    </script>
</body>

</html>
